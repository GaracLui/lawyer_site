{% load django_vite %}
<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    {% block meta %}
    {% endblock %}

    <title>{% block title %}{{ global_settings.company_name }}{% endblock %}</title>

    {% vite_hmr_client %}
    {% vite_asset 'assets/styles/style.css' %}

</head>
<body class="bg-amber-50 ">

    <p class="text-center text-2xl font-bold text-gray-800 py-4">{{ SiteSettings.company_name }}</p>
    {% block content %}
    {% endblock %}

</body>
</html>
