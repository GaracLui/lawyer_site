{% load django_vite %}
<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    {% block meta %}
    {% endblock %}

    <title>{% block title %}My Website{% endblock %}</title>

    {% vite_hmr_client %}
    {% vite_asset 'assets/styles/style.css' %}

</head>
<body class="bg-amber-50 ">

    {% block content %}
    {% endblock %}

</body>
</html>
